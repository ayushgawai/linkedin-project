# LinkedInClone full stack — MySQL, MongoDB, Redis, Kafka + Zookeeper,
# and the three Node services Phase 5 benchmarks hit (analytics, profile, job).
#
# Build context is the repo root so each service Dockerfile can COPY
# services/shared/ into its image. Run from this file's folder:
#   cd infra && docker compose up -d
# or from repo root:
#   docker compose -f infra/docker-compose.yml up -d

name: linkedinclone

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: linkedinclone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-linkedin}
      MYSQL_DATABASE: ${DB_NAME:-linkedinclone}
    ports:
      - '${DB_PORT_HOST:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ../data/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  mongodb:
    image: mongo:7
    container_name: linkedinclone-mongodb
    ports:
      - '${MONGO_PORT_HOST:-27017}:27017'
    volumes:
      - mongo_data:/data/db
      - ../data/mongo_setup.js:/docker-entrypoint-initdb.d/mongo_setup.js:ro
    healthcheck:
      test: ['CMD-SHELL', "echo 'db.runCommand({ ping: 1 })' | mongosh --quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  redis:
    image: redis:7-alpine
    container_name: linkedinclone-redis
    command: ['redis-server', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    ports:
      - '${REDIS_PORT_HOST:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: linkedinclone-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '${ZOOKEEPER_PORT_HOST:-2181}:2181'
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ['CMD-SHELL', 'echo ruok | nc localhost 2181 | grep imok']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: linkedinclone-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '${KAFKA_PORT_HOST:-9092}:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Dual-listener: INSIDE used by other compose services, OUTSIDE used by host.
      KAFKA_LISTENERS: INSIDE://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1']
      interval: 15s
      timeout: 10s
      retries: 10
    networks: [backend]

  # One-shot job that seeds the default Kafka topics so consumers don't race
  # the producer on a cold start. Idempotent — `--if-not-exists` guards.
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: linkedinclone-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >-
      bash -c "
        set -euo pipefail;
        for t in job.viewed job.saved application.submitted application.status.updated
                 connection.accepted connection.requested message.sent member.created
                 member.updated member.deleted job.created job.closed; do
          kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
            --topic $$t --partitions 3 --replication-factor 1;
        done;
        echo 'kafka topics ready';
      "
    networks: [backend]
    restart: 'no'

  # ---------------------------------------------------------------------------
  # Application services owned by Member 5 (Naman)
  # ---------------------------------------------------------------------------
  profile:
    build:
      context: ..
      dockerfile: services/profile/Dockerfile
    container_name: linkedinclone-profile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 8001
      SERVICE_NAME: profile
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS:-linkedin}
      DB_NAME: ${DB_NAME:-linkedinclone}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      CACHE_TTL_ENTITY_SEC: ${CACHE_TTL_ENTITY_SEC:-300}
      CACHE_TTL_SEARCH_SEC: ${CACHE_TTL_SEARCH_SEC:-60}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${PROFILE_PORT_HOST:-8001}:8001'
    networks: [backend]
    restart: unless-stopped

  job:
    build:
      context: ..
      dockerfile: services/job/Dockerfile
    container_name: linkedinclone-job
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 8002
      SERVICE_NAME: job
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS:-linkedin}
      DB_NAME: ${DB_NAME:-linkedinclone}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      CACHE_TTL_ENTITY_SEC: ${CACHE_TTL_ENTITY_SEC:-300}
      CACHE_TTL_SEARCH_SEC: ${CACHE_TTL_SEARCH_SEC:-60}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${JOB_PORT_HOST:-8002}:8002'
    networks: [backend]
    restart: unless-stopped

  analytics:
    build:
      context: ..
      dockerfile: services/analytics/Dockerfile
    container_name: linkedinclone-analytics
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 8006
      SERVICE_NAME: analytics
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS:-linkedin}
      DB_NAME: ${DB_NAME:-linkedinclone}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: ${MONGO_DB:-linkedinclone}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: analytics-service
      KAFKA_CONSUMER_GROUP: analytics-consumer-group
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      ANALYTICS_CACHE_TTL_SEC: ${ANALYTICS_CACHE_TTL_SEC:-60}
      BENCH_ADMIN_TOKEN: ${BENCH_ADMIN_TOKEN:-dev-only}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - '${ANALYTICS_PORT_HOST:-8006}:8006'
    networks: [backend]
    restart: unless-stopped

networks:
  backend:
    driver: bridge
    name: linkedinclone-backend

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
