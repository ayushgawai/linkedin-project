services:
  mysql:
    image: mysql:8.4
    container_name: linkedinclone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-linkedin}
      MYSQL_DATABASE: ${DB_NAME:-linkedinclone}
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ../data/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:7
    container_name: linkedinclone-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
      - ../data/mongo_setup.js:/docker-entrypoint-initdb.d/mongo_setup.js:ro
    healthcheck:
      test: ['CMD-SHELL', "echo 'db.runCommand({ ping: 1 })' | mongosh --quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: linkedinclone-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: linkedinclone-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: '-Dzookeeper.4lw.commands.whitelist=*'
    ports:
      - '2181:2181'
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ['CMD-SHELL', 'echo srvr | nc localhost 2181 | grep -q Zookeeper']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: linkedinclone-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 50s

  profile:
    build:
      context: ..
      dockerfile: services/profile/Dockerfile
    container_name: linkedinclone-profile
    environment:
      PORT: 8001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS:-linkedin}
      DB_NAME: ${DB_NAME:-linkedinclone}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '8001:8001'

  job:
    build:
      context: ..
      dockerfile: services/job/Dockerfile
    container_name: linkedinclone-job
    environment:
      PORT: 8002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS:-linkedin}
      DB_NAME: ${DB_NAME:-linkedinclone}
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '8002:8002'

  application:
    build:
      context: ..
      dockerfile: services/application/Dockerfile
    container_name: linkedinclone-application
    environment:
      PORT: 8003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS:-linkedin}
      DB_NAME: ${DB_NAME:-linkedinclone}
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '8003:8003'

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
