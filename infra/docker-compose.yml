services:
  mysql:
    image: mysql:8.4
    container_name: linkedinclone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-linkedin}
      MYSQL_DATABASE: ${DB_NAME:-linkedinclone}
    # Host 3307 -> container 3306 (avoids "address already in use" if Homebrew/local MySQL uses 3306)
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ../data/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      # First boot can run schema init; allow time before health counts
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:7
    container_name: linkedinclone-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
      - ../data/mongo_setup.js:/docker-entrypoint-initdb.d/mongo_setup.js:ro
    healthcheck:
      # Reliable ping without stdin piping (avoids empty mongosh issues)
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand({ ping: 1 })']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: linkedinclone-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: linkedinclone-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # ZK 3.5+ disables most four-letter word commands; whitelist for health + debugging (Confluent-recommended form)
      KAFKA_OPTS: '-Dzookeeper.4lw.commands.whitelist=*'
    ports:
      - '2181:2181'
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      # ZK 3.8+ often has 'ruok' off; 'srvr' is reliable (first line(s) include Zookeeper version / Mode)
      test: ['CMD-SHELL', "printf 'srvr' | nc -w 2 127.0.0.1 2181 2>/dev/null | grep -qE 'Zookeeper|Mode|standalone|leader|follower' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: linkedinclone-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1']
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 50s

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
