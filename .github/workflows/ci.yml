name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  docs-and-contract-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: npm ci

      - name: Run API documentation contract checks
        run: |
          bash tests/submission_contract_check.sh

      - name: Run Node test suite (Member 1 + analytics + contract-aligned checks)
        run: npm test

      - name: Validate Postman collection JSON
        run: |
          python3 - << 'PY'
          import json
          with open('docs/submission/LinkedInClone_API_Collection.postman_collection.json', 'r', encoding='utf-8') as f:
              json.load(f)
          print('Postman collection JSON is valid')
          PY

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Linkedin Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "Linkedin Frontend/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-build-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: ./Linkedin Frontend
            dockerfile: ./Linkedin Frontend/Dockerfile
          - name: data-bootstrap
            context: .
            dockerfile: ./data/Dockerfile
          - name: profile
            context: .
            dockerfile: ./services/profile/Dockerfile
          - name: job
            context: .
            dockerfile: ./services/job/Dockerfile
          - name: application
            context: .
            dockerfile: ./services/application/Dockerfile
          - name: messaging
            context: .
            dockerfile: ./services/messaging/Dockerfile
          - name: connection
            context: .
            dockerfile: ./services/connection/Dockerfile
          - name: analytics
            context: .
            dockerfile: ./services/analytics/Dockerfile
          - name: api-gateway
            context: .
            dockerfile: ./services/api-gateway/Dockerfile
          - name: posts
            context: .
            dockerfile: ./services/posts/Dockerfile
          - name: ai-agent
            context: .
            dockerfile: ./services/ai-agent/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
