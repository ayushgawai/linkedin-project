<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
    </marker>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #0a66c2; }
      .subtitle { font: 500 20px Arial, sans-serif; fill: #374151; }
      .tier { font: 700 24px Arial, sans-serif; fill: #111827; }
      .svc { font: 600 16px Arial, sans-serif; fill: #111827; }
      .meta { font: 500 14px Arial, sans-serif; fill: #4b5563; }
      .lbl { font: 600 15px Arial, sans-serif; fill: #1f2937; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#f8fafc"/>
  <text x="52" y="62" class="title">LinkedInClone Distributed Architecture (API Contract Freeze)</text>
  <text x="52" y="95" class="subtitle">3-Tier Services + Kafka Event Bus + MySQL/MongoDB + Redis</text>

  <rect x="45" y="130" width="1510" height="180" rx="14" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="65" y="165" class="tier">Tier 1: Client Layer</text>
  <rect x="70" y="190" width="280" height="90" rx="10" fill="#ffffff" stroke="#0284c7"/>
  <text x="90" y="227" class="svc">React Frontend</text>
  <text x="90" y="252" class="meta">Port 3000</text>

  <rect x="45" y="330" width="1510" height="420" rx="14" fill="#ecfeff" stroke="#5eead4"/>
  <text x="65" y="365" class="tier">Tier 2: API + Messaging Layer</text>

  <rect x="70" y="390" width="170" height="95" rx="10" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="86" y="426" class="svc">Profile Service</text>
  <text x="86" y="449" class="meta">:8001</text>

  <rect x="260" y="390" width="170" height="95" rx="10" fill="#ffffff" stroke="#a855f7"/>
  <text x="286" y="426" class="svc">Job Service</text>
  <text x="286" y="449" class="meta">:8002</text>

  <rect x="450" y="390" width="190" height="95" rx="10" fill="#ffffff" stroke="#f59e0b"/>
  <text x="465" y="426" class="svc">Application Service</text>
  <text x="465" y="449" class="meta">:8003</text>

  <rect x="660" y="390" width="180" height="95" rx="10" fill="#ffffff" stroke="#14b8a6"/>
  <text x="680" y="426" class="svc">Messaging Service</text>
  <text x="680" y="449" class="meta">:8004</text>

  <rect x="860" y="390" width="180" height="95" rx="10" fill="#ffffff" stroke="#6366f1"/>
  <text x="878" y="426" class="svc">Connection Service</text>
  <text x="878" y="449" class="meta">:8005</text>

  <rect x="1060" y="390" width="190" height="95" rx="10" fill="#ffffff" stroke="#e11d48"/>
  <text x="1078" y="426" class="svc">Analytics Service</text>
  <text x="1078" y="449" class="meta">:8006</text>

  <rect x="1270" y="390" width="210" height="95" rx="10" fill="#ffffff" stroke="#4b5563"/>
  <text x="1300" y="426" class="svc">AI Agent Service</text>
  <text x="1300" y="449" class="meta">:8007 (FastAPI)</text>

  <rect x="450" y="540" width="700" height="170" rx="14" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="480" y="575" class="tier">Kafka Event Bus</text>
  <text x="480" y="603" class="lbl">Topics:</text>
  <text x="545" y="603" class="meta">job.viewed, job.saved, application.submitted, message.sent, connection.requested, ai.requests, ai.results</text>
  <text x="480" y="635" class="lbl">Envelope:</text>
  <text x="560" y="635" class="meta">event_type, trace_id, timestamp, actor_id, entity, payload, idempotency_key</text>
  <text x="480" y="667" class="meta">At-least-once delivery with idempotent consumers</text>

  <rect x="45" y="770" width="1510" height="170" rx="14" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="65" y="805" class="tier">Tier 3: Data Layer</text>
  <rect x="90" y="830" width="440" height="86" rx="10" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="110" y="864" class="svc">MySQL (3306)</text>
  <text x="110" y="888" class="meta">members, recruiters, jobs, applications, connections, messages, outbox_events</text>

  <rect x="570" y="830" width="440" height="86" rx="10" fill="#ffffff" stroke="#16a34a"/>
  <text x="590" y="864" class="svc">MongoDB (27017)</text>
  <text x="590" y="888" class="meta">events, ai_traces, resumes, profile_views</text>

  <rect x="1050" y="830" width="220" height="86" rx="10" fill="#ffffff" stroke="#dc2626"/>
  <text x="1070" y="864" class="svc">Redis (6379)</text>
  <text x="1070" y="888" class="meta">cache layer</text>

  <rect x="1300" y="830" width="220" height="86" rx="10" fill="#ffffff" stroke="#f97316"/>
  <text x="1320" y="864" class="svc">Seed Loader</text>
  <text x="1320" y="888" class="meta">jobs + resumes</text>

  <line x1="350" y1="235" x2="155" y2="390" stroke="#374151" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="350" y1="235" x2="345" y2="390" stroke="#374151" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="350" y1="235" x2="545" y2="390" stroke="#374151" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="350" y1="235" x2="750" y2="390" stroke="#374151" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="350" y1="235" x2="950" y2="390" stroke="#374151" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="350" y1="235" x2="1155" y2="390" stroke="#374151" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="350" y1="235" x2="1375" y2="390" stroke="#374151" stroke-width="2.2" marker-end="url(#arrow)"/>

  <line x1="545" y1="485" x2="545" y2="540" stroke="#9a3412" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="750" y1="485" x2="750" y2="540" stroke="#9a3412" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="950" y1="485" x2="950" y2="540" stroke="#9a3412" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="1155" y1="485" x2="1020" y2="540" stroke="#9a3412" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="1375" y1="485" x2="1080" y2="540" stroke="#9a3412" stroke-width="2.2" marker-end="url(#arrow)"/>

  <line x1="800" y1="710" x2="320" y2="830" stroke="#374151" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="800" y1="710" x2="790" y2="830" stroke="#374151" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="800" y1="710" x2="1160" y2="830" stroke="#374151" stroke-width="2.2" marker-end="url(#arrow)"/>

  <text x="52" y="964" class="meta">Diagram generated for API documentation submission. Highlights service boundaries, endpoint ownership domains, and Kafka contract path.</text>
</svg>
